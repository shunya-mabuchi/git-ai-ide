name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Typecheck, test, build, E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm test:e2e:install

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm -r test

      - name: Build web app
        run: pnpm --filter @git-ai-ide/web build

      - name: Playwright E2E
        run: pnpm --filter @git-ai-ide/web test:e2e
